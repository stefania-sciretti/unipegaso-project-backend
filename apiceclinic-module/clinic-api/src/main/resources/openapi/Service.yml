openapi: 3.0.0
info:
  title: Service API
  description: Catalog of services offered by specialists.
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/services:
    get:
      summary: List all services
      description: Returns all services, optionally filtered by specialist
      operationId: findAllServices
      parameters:
        - name: specialistId
          in: query
          required: false
          description: Filter services by specialist ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceResponse"
        "401":
          description: Unauthorized
    post:
      summary: Create a new service
      operationId: createService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceRequest"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "400":
          description: Validation error
        "404":
          description: Specialist not found
        "401":
          description: Unauthorized

  /api/services/{id}:
    get:
      summary: Get service by ID
      operationId: getServiceById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Service found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "404":
          description: Service not found
        "401":
          description: Unauthorized
    put:
      summary: Update a service
      operationId: updateService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceRequest"
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceResponse"
        "400":
          description: Validation error
        "404":
          description: Service or Specialist not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete a service
      operationId: deleteService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Service deleted
        "404":
          description: Service not found
        "401":
          description: Unauthorized 

components:
  schemas:
    ServiceRequest:
      type: object
      required:
        - service
        - price
        - specialistId
      properties:
        service:
          type: string
          minLength: 1
          maxLength: 255
          description: Name of the service offered
          example: "Nutritional consultation"
        price:
          type: number
          format: double
          description: Price of the service in euros
          example: 80.00
        specialistId:
          type: integer
          format: int64
          description: ID of the specialist offering this service
          example: 1

    ServiceResponse:
      type: object
      required:
        - id
        - service
        - price
        - specialistId
      properties:
        id:
          type: integer
          format: int64
          example: 1
        service:
          type: string
          description: Name of the service offered
          example: "Nutritional consultation"
        price:
          type: number
          format: double
          description: Price of the service in euros
          example: 80.00
        specialistId:
          type: integer
          format: int64
          description: ID of the specialist offering this service
          example: 1
        areaId:
          type: integer
          format: int64
          nullable: true
          description: ID of the area this service belongs to
          example: 1
        areaName:
          type: string
          nullable: true
          description: Name of the area this service belongs to
          example: "Alimentazione"

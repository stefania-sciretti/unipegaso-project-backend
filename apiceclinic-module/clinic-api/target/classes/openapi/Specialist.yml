openapi: 3.0.0
info:
  title: Specialist API
  version: "1"
servers:
  - url: "http://localhost:8080"
paths:

  /api/specialists:
    get:
      summary: List all specialists
      description: Returns the list of all medical specialists
      operationId: getAllSpecialists
      responses:
        '200':
          description: List of specialists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpecialistResponse"
    post:
      summary: Register a new specialist
      description: Creates a new medical specialist
      operationId: createSpecialist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecialistRequest"
      responses:
        '201':
          description: Specialist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialistResponse"

  /api/specialists/{id}:
    get:
      summary: Get specialist by ID
      description: Returns a specialist by its ID
      operationId: getSpecialistById
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the specialist
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Specialist found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialistResponse"
        '404':
          description: Specialist not found
    patch:
      summary: Update specialist information
      description: Updates a specialist by its ID
      operationId: updateSpecialist
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the specialist
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecialistRequest"
      responses:
        '200':
          description: Specialist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialistResponse"
        '404':
          description: Specialist not found
    delete:
      summary: Delete a specialist
      description: Deletes a specialist by its ID
      operationId: deleteSpecialist
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the specialist
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Specialist deleted
        '404':
          description: Specialist not found

components:
  schemas:
    SpecialistRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        specialization:
          type: string
        email:
          type: string
          format: email
        licenseNumber:
          type: string
      required:
        - firstName
        - lastName
        - specialization
        - email
        - licenseNumber
    SpecialistResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        specialization:
          type: string
        email:
          type: string
          format: email
        licenseNumber:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - specialization
        - email
        - licenseNumber
        - createdAt

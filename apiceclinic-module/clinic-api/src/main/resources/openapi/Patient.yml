openapi: 3.0.0
info:
  title: Patient API
  version: "1"
servers:
  - url: "http://localhost:8080"
paths:

  /api/patients:
    get:
      summary: List all patients
      description: Returns the list of all patients, optionally filtered by name (case-insensitive, min 3 chars)
      operationId: getAllPatients
      parameters:
        - name: search
          in: query
          required: false
          description: Filter by first or last name (case-insensitive, minimum 3 characters)
          schema:
            type: string
            minLength: 3
      responses:
        '200':
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientResponse"
        '401':
          description: Unauthorized
    post:
      summary: Register a new patient
      description: Creates a new patient
      operationId: createPatient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientRequest"
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        '400':
          description: Validation error
        '401':
          description: Unauthorized

  /api/patients/{id}:
    get:
      summary: Get patient by ID
      description: Returns a patient by its ID
      operationId: getPatientById
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the patient
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Patient found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        '404':
          description: Patient not found
        '401':
          description: Unauthorized
    put:
      summary: Update patient information
      description: Updates a patient by its ID
      operationId: updatePatient
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the patient
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientRequest"
      responses:
        '200':
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        '400':
          description: Validation error
        '404':
          description: Patient not found
        '401':
          description: Unauthorized
    delete:
      summary: Delete a patient
      description: Deletes a patient by its ID
      operationId: deletePatient
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the patient
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Patient deleted
        '404':
          description: Patient not found
        '401':
          description: Unauthorized

components:
  schemas:
    PatientRequest:
      type: object
      properties:
        firstName:
          type: string
          description: Patient's first name
        lastName:
          type: string
          description: Patient's last name
        fiscalCode:
          type: string
          description: Italian fiscal code (16 characters, e.g. RSSMRA85T10A562S)
          minLength: 16
          maxLength: 16
          pattern: '^[A-Z]{6}\d{2}[A-Z]\d{2}[A-Z]\d{3}[A-Z]$'
          example: "RSSMRA85T10A562S"
        birthDate:
          type: string
          format: date
          description: Patient's birth date
        email:
          type: string
          format: email
          description: Patient's email address
        phone:
          type: string
          nullable: true
          description: Patient's phone number
      required:
        - firstName
        - lastName
        - fiscalCode
        - birthDate
        - email
    PatientResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        fiscalCode:
          type: string
          description: Italian fiscal code
        birthDate:
          type: string
          format: date
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - fiscalCode
        - birthDate
        - email
        - createdAt
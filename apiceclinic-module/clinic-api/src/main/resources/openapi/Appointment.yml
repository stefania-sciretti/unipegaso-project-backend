openapi: 3.0.0
info:
  title: Appointment API
  version: "1"
servers:
  - url: "http://localhost:8080"
paths:
  /api/appointments:
    get:
      summary: List all appointments
      description: List all appointments, optionally filtered by patientId, doctorId or status
      operationId: findAllAppointments
      parameters:
        - name: patientId
          in: query
          required: false
          description: Filter by patient ID
          schema:
            type: integer
            format: int64
        - name: doctorId
          in: query
          required: false
          description: Filter by doctor ID
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: false
          description: Filter by appointment status
          schema:
            type: string
      responses:
        '200':
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentResponse"
    post:
      summary: Create a new appointment
      description: Creates a new clinical appointment
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRequest"
      responses:
        '201':
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"

  /api/appointments/{id}:
    get:
      summary: Get appointment by ID
      description: Returns an appointment by its ID
      operationId: getAppointmentById
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        '404':
          description: Appointment not found
    delete:
      summary: Cancel an appointment
      description: Cancels an appointment by its ID
      operationId: deleteAppointment
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Appointment cancelled
        '404':
          description: Appointment not found

  /api/appointments/{id}/status:
    patch:
      summary: Update appointment status
      description: Updates the status of an existing appointment
      operationId: updateAppointmentStatus
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentStatusRequest"
      responses:
        '200':
          description: Appointment status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        '404':
          description: Appointment not found

components:
  schemas:
    AppointmentRequest:
      type: object
      properties:
        patientId:
          type: integer
          format: int64
        doctorId:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        reason:
          type: string
        notes:
          type: string
      required:
        - patientId
        - doctorId
        - startTime
        - endTime

    AppointmentStatusRequest:
      type: object
      properties:
        status:
          type: string
          description: New appointment status (e.g. SCHEDULED, COMPLETED, CANCELLED)
      required:
        - status

    AppointmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        patientId:
          type: integer
          format: int64
        doctorId:
          type: integer
          format: int64
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
        reason:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - doctorId
        - startTime
        - endTime
        - status
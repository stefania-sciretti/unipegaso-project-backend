openapi: 3.0.0
info:
  title: Clinical Reports API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/reports:
    get:
      summary: List all reports
      description: Returns all clinical reports
      operationId: findAllReports
      responses:
        "200":
          description: List of clinical reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportResponse"
        "401":
          description: Unauthorized

    post:
      summary: Create a new report for a COMPLETED appointment
      description: Creates a clinical report linked to a completed fitness appointment
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "400":
          description: Validation error (appointment not completed or report already exists)
        "404":
          description: Appointment not found
        "401":
          description: Unauthorized

  /api/reports/{id}:
    get:
      summary: Get report by ID
      description: Returns a clinical report by its ID
      operationId: getReportById
      parameters:
        - name: id
          in: path
          required: true
          description: Report ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Report found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "404":
          description: Report not found
        "401":
          description: Unauthorized

    put:
      summary: Update an existing report
      description: Updates an existing clinical report by its ID
      operationId: updateReport
      parameters:
        - name: id
          in: path
          required: true
          description: Report ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "200":
          description: Report updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "404":
          description: Report not found
        "401":
          description: Unauthorized

  /api/reports/appointment/{appointmentId}:
    get:
      summary: Get report by appointment ID
      description: Returns the report associated with a given appointment ID
      operationId: getReportByAppointmentId
      parameters:
        - name: appointmentId
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Report found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "404":
          description: Report not found for this appointment
        "401":
          description: Unauthorized

components:
  schemas:
    ReportRequest:
      type: object
      properties:
        appointmentId:
          type: integer
          format: int64
          description: ID of the appointment this report refers to
        diagnosis:
          type: string
          minLength: 1
          description: Clinical diagnosis
        prescription:
          type: string
          nullable: true
          description: Prescription or treatment plan
        specialistNotes:
          type: string
          nullable: true
          description: Additional notes from the specialist
      required:
        - appointmentId
        - diagnosis

    ReportResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        appointmentId:
          type: integer
          format: int64
        patientFullName:
          type: string
          description: Full name of the patient
          example: "Mario Rossi"
        specialistFullName:
          type: string
          description: Full name of the specialist
          example: "Carlo Verdi"
        visitType:
          type: string
          description: Service type of the linked appointment
          example: "PERSONAL_TRAINING"
        scheduledAt:
          type: string
          format: date-time
          description: Date and time of the linked appointment
        issuedDate:
          type: string
          format: date
          description: Date the report was issued
        diagnosis:
          type: string
        prescription:
          type: string
          nullable: true
        specialistNotes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - appointmentId
        - patientFullName
        - specialistFullName
        - visitType
        - scheduledAt
        - issuedDate
        - diagnosis
        - createdAt
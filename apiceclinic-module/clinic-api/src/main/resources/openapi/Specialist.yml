openapi: 3.0.0
info:
  title: Specialist API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/specialists:
    get:
      summary: List all specialists
      description: Optionally filter by role
      operationId: findAllSpecialists
      parameters:
        - name: role
          in: query
          required: false
          description: Filter by role (e.g. TRAINER, NUTRITIONIST)
          schema:
            type: string
      responses:
        "200":
          description: List of specialists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpecialistResponse"
        "401":
          description: Unauthorized
    post:
      summary: Register a new specialist
      operationId: createSpecialist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecialistRequest"
      responses:
        "201":
          description: Specialist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialistResponse"
        "400":
          description: Validation error
        "409":
          description: Email already exists
        "401":
          description: Unauthorized

  /api/specialists/{id}:
    get:
      summary: Get specialist by ID
      operationId: getSpecialistById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Specialist found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialistResponse"
        "404":
          description: Specialist not found
        "401":
          description: Unauthorized
    put:
      summary: Update specialist information
      operationId: updateSpecialist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecialistRequest"
      responses:
        "200":
          description: Specialist updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialistResponse"
        "400":
          description: Validation error
        "404":
          description: Specialist not found
        "409":
          description: Email already exists
        "401":
          description: Unauthorized
    delete:
      summary: Delete a specialist
      operationId: deleteSpecialist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Specialist deleted
        "404":
          description: Specialist not found
        "401":
          description: Unauthorized

components:
  schemas:
    SpecialistRequest:
      type: object
      required:
        - firstName
        - lastName
        - role
        - email
      properties:
        firstName:
          type: string
          example: "Maria"
        lastName:
          type: string
          example: "Rossi"
        role:
          type: string
          example: "NUTRITIONIST"
        bio:
          type: string
          nullable: true
          example: "Nutritionist with 10 years of experience"
        email:
          type: string
          format: email
          example: "maria.rossi@apiceclinic.it"

    SpecialistResponse:
      type: object
      required:
        - id
        - firstName
        - lastName
        - role
        - email
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        bio:
          type: string
          nullable: true
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

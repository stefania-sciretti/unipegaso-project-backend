spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/apiceclinic}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:c2VjcmV0S2V5Rm9yQXBpY2VDbGluaWNEZXZFbnZpcm9ubWVudE9ubHkyMDI2}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

server:
  port: 8080

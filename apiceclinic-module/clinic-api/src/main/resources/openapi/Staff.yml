openapi: 3.0.0
info:
  title: Specialist API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/specialists:
    get:
      summary: List all specialists
      description: Optionally filter by role
      operationId: findAllSpecialists
      parameters:
        - name: role
          in: query
          required: false
          description: Filter specialists by role (e.g. TRAINER, NUTRITIONIST)
          schema:
            type: string
      responses:
        "200":
          description: List of specialists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpecialistResponse"

  /api/specialists/{id}:
    get:
      summary: Get specialist by ID
      description: Returns a specialist by its ID
      operationId: getSpecialistById
      parameters:
        - name: id
          in: path
          required: true
          description: Specialist ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Specialist found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialistResponse"
        "404":
          description: Specialist not found

components:
  schemas:
    SpecialistResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          description: Specialist role (e.g. TRAINER, NUTRITIONIST)
        email:
          type: string
          format: email
        phone:
          type: string
        specialization:
          type: string
          description: Main specialization of the specialist
      required:
        - id
        - firstName
        - lastName
        - role
        - email
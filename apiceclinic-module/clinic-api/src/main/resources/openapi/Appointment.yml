openapi: 3.0.0
info:
  title: Appointment API
  description: Unified appointment booking and management
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"

paths:
  /api/appointments:
    get:
      summary: List all appointments
      description: Returns all appointments, optionally filtered by patientId, specialistId or status
      operationId: findAllAppointments
      tags: [Appointments]
      parameters:
        - name: patientId
          in: query
          required: false
          schema: { type: integer, format: int64 }
        - name: specialistId
          in: query
          required: false
          schema: { type: integer, format: int64 }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentResponse"
        "401":
          description: Unauthorized

    post:
      summary: Book a new appointment
      operationId: createAppointment
      tags: [Appointments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRequest"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /api/appointments/{id}:
    get:
      summary: Get appointment by ID
      operationId: getAppointmentById
      tags: [Appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          description: Appointment not found
        "401":
          description: Unauthorized

    delete:
      summary: Cancel an appointment (soft cancel — sets status to CANCELLED)
      operationId: deleteAppointment
      tags: [Appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "204":
          description: Appointment cancelled
        "404":
          description: Appointment not found
        "401":
          description: Unauthorized

  /api/appointments/{id}/status:
    put:
      summary: Update appointment status
      operationId: updateAppointmentStatus
      tags: [Appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "400":
          description: Validation error
        "404":
          description: Appointment not found
        "401":
          description: Unauthorized

components:
  schemas:
    AppointmentRequest:
      type: object
      required:
        - patientId
        - specialistId
        - scheduledAt
        - serviceType
      properties:
        patientId:
          type: integer
          format: int64
          example: 1
        specialistId:
          type: integer
          format: int64
          example: 2
        scheduledAt:
          type: string
          format: date-time
          example: "2026-06-15T10:30:00"
        serviceType:
          type: string
          minLength: 1
          example: "PERSONAL_TRAINING"
        notes:
          type: string
          nullable: true
        price:
          type: number
          format: double
          nullable: true
          default: 0
          example: 50.0

    AppointmentStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          minLength: 1
          example: "COMPLETED"

    AppointmentResponse:
      type: object
      required:
        - id
        - patientId
        - patientFullName
        - specialistId
        - specialistFullName
        - specialistRole
        - scheduledAt
        - serviceType
        - status
        - hasReport
        - price
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        patientId:
          type: integer
          format: int64
        patientFullName:
          type: string
        specialistId:
          type: integer
          format: int64
        specialistFullName:
          type: string
        specialistRole:
          type: string
        scheduledAt:
          type: string
          format: date-time
        serviceType:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true
        hasReport:
          type: boolean
        areaId:
          type: integer
          format: int64
          nullable: true
        areaName:
          type: string
          nullable: true
        price:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time

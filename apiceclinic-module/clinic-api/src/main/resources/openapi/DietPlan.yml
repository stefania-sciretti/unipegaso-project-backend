openapi: 3.0.0
info:
  title: Diet Plan API
  version: "1"
servers:
  - url: "http://localhost:8080"
paths:
  /api/diet-plans:
    get:
      summary: List all diet plans
      description: List all diet plans, optionally filtered by patientId
      operationId: findAllDietPlans
      parameters:
        - name: patientId
          in: query
          required: false
          description: Filter diet plans by patient ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of diet plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DietPlanResponse"
        '401':
          description: Unauthorized
    post:
      summary: Create a new diet plan
      description: Creates a new personalized diet plan for a patient, assigned to a specialist
      operationId: createDietPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietPlanRequest"
      responses:
        '201':
          description: Diet plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietPlanResponse"
        '400':
          description: Validation error
        '404':
          description: Patient or specialist not found
        '401':
          description: Unauthorized

  /api/diet-plans/{id}:
    get:
      summary: Get diet plan by ID
      description: Returns a diet plan by its ID
      operationId: getDietPlanById
      parameters:
        - name: id
          in: path
          required: true
          description: Diet plan ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Diet plan found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietPlanResponse"
        '404':
          description: Diet plan not found
        '401':
          description: Unauthorized
    put:
      summary: Update a diet plan
      description: Updates an existing diet plan
      operationId: updateDietPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Diet plan ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietPlanRequest"
      responses:
        '200':
          description: Diet plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietPlanResponse"
        '400':
          description: Validation error
        '404':
          description: Diet plan not found
        '401':
          description: Unauthorized
    delete:
      summary: Delete a diet plan
      description: Deletes a diet plan by its ID
      operationId: deleteDietPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Diet plan ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Diet plan deleted
        '404':
          description: Diet plan not found
        '401':
          description: Unauthorized

components:
  schemas:
    DietPlanRequest:
      type: object
      properties:
        patientId:
          type: integer
          format: int64
          description: ID of the patient
        specialistId:
          type: integer
          format: int64
          description: ID of the specialist (nutritionist) assigning the plan
        title:
          type: string
          description: Title of the diet plan
        description:
          type: string
          nullable: true
          description: Optional description of the plan
        calories:
          type: integer
          description: Daily calorie target (500–5000)
          minimum: 500
          maximum: 5000
          nullable: true
        durationWeeks:
          type: integer
          description: Duration of the plan in weeks (1–52)
          minimum: 1
          maximum: 52
          nullable: true
        active:
          type: boolean
          default: true
          description: Whether the plan is currently active
      required:
        - patientId
        - specialistId
        - title

    DietPlanResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        patientId:
          type: integer
          format: int64
        specialistId:
          type: integer
          format: int64
        patientFirstName:
          type: string
        patientLastName:
          type: string
        specialistFirstName:
          type: string
        specialistLastName:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        calories:
          type: integer
          nullable: true
        durationWeeks:
          type: integer
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - specialistId
        - patientFirstName
        - patientLastName
        - specialistFirstName
        - specialistLastName
        - title
        - active
        - createdAt
        - updatedAt
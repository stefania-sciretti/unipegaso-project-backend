openapi: 3.0.0
info:
  title: Clinical Reports API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/reports:
    get:
      summary: List all reports
      description: Returns all clinical reports
      operationId: findAllReports
      responses:
        "200":
          description: List of clinical reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportResponse"

    post:
      summary: Create a new report for a COMPLETED appointment
      description: Creates a clinical report linked to a completed appointment
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"

  /api/reports/{id}:
    get:
      summary: Get report by ID
      description: Returns a clinical report by its ID
      operationId: getReportById
      parameters:
        - name: id
          in: path
          required: true
          description: Report ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Report found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "404":
          description: Report not found

    put:
      summary: Update an existing report
      description: Updates an existing clinical report by its ID
      operationId: updateReport
      parameters:
        - name: id
          in: path
          required: true
          description: Report ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "200":
          description: Report updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "404":
          description: Report not found

  /api/reports/appointment/{appointmentId}:
    get:
      summary: Get report by appointment ID
      description: Returns the report associated with a given appointment ID
      operationId: getReportByAppointmentId
      parameters:
        - name: appointmentId
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Report found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "404":
          description: Report not found for this appointment

components:
  schemas:
    ReportRequest:
      type: object
      properties:
        appointmentId:
          type: integer
          format: int64
          description: ID of the appointment this report refers to
        title:
          type: string
          description: Report title
        summary:
          type: string
          description: Short summary of the report
        details:
          type: string
          description: Detailed clinical notes
        recommendations:
          type: string
          description: Recommended follow-up actions, therapies, or lifestyle changes
      required:
        - appointmentId
        - title
        - details

    ReportResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        appointmentId:
          type: integer
          format: int64
        title:
          type: string
        summary:
          type: string
        details:
          type: string
        recommendations:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - appointmentId
        - title
        - details
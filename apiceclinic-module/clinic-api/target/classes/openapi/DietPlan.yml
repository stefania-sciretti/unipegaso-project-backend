openapi: 3.0.0
info:
  title: Diet Plan API
  version: "1"
servers:
  - url: "http://localhost:8080"
paths:
  /api/diet-plans:
    get:
      summary: List all diet plans
      description: List all diet plans, optionally filtered by patientId
      operationId: findAllDietPlans
      parameters:
        - name: patientId
          in: query
          required: false
          description: Filter diet plans by patient ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of diet plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DietPlanResponse"
    post:
      summary: Create a new diet plan
      description: Creates a new personalized diet plan
      operationId: createDietPlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietPlanRequest"
      responses:
        '201':
          description: Diet plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietPlanResponse"

  /api/diet-plans/{id}:
    get:
      summary: Get diet plan by ID
      description: Returns a diet plan by its ID
      operationId: getDietPlanById
      parameters:
        - name: id
          in: path
          required: true
          description: Diet plan ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Diet plan found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietPlanResponse"
        '404':
          description: Diet plan not found
    put:
      summary: Update a diet plan
      description: Updates an existing diet plan
      operationId: updateDietPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Diet plan ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DietPlanRequest"
      responses:
        '200':
          description: Diet plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DietPlanResponse"
        '404':
          description: Diet plan not found
    delete:
      summary: Delete a diet plan
      description: Deletes a diet plan by its ID
      operationId: deleteDietPlan
      parameters:
        - name: id
          in: path
          required: true
          description: Diet plan ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Diet plan deleted
        '404':
          description: Diet plan not found

components:
  schemas:
    DietPlanRequest:
      type: object
      properties:
        patientId:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        totalCaloriesPerDay:
          type: integer
        notes:
          type: string
      required:
        - patientId
        - title
        - startDate
        - endDate

    DietPlanResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        patientId:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        totalCaloriesPerDay:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - title
        - startDate
        - endDate
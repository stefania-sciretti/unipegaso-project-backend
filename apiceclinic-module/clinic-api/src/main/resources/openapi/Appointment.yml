openapi: 3.0.0
info:
  title: Medical Appointment API
  description: >
    Clinical appointment booking and management (medical visits).
    NOTE: This endpoint is planned but not yet active.
    The active appointment endpoint is /api/appointments (FitnessAppointment).
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"

paths:
  /api/medical-appointments:
    get:
      summary: List all medical appointments
      description: Returns all medical appointments, optionally filtered by patientId, specialistId or status
      operationId: findAllAppointments
      tags: [Appointments]
      parameters:
        - name: patientId
          in: query
          required: false
          description: Filter by patient ID
          schema:
            type: integer
            format: int64
        - name: specialistId
          in: query
          required: false
          description: Filter by specialist ID
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: false
          description: Filter by appointment status (e.g. BOOKED, COMPLETED, CANCELLED)
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentResponse"
        "401":
          description: Unauthorized

    post:
      summary: Book a new medical appointment
      description: Creates a new clinical appointment
      operationId: createAppointment
      tags: [Appointments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRequest"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /api/medical-appointments/{id}:
    get:
      summary: Get medical appointment by ID
      operationId: getAppointmentById
      tags: [Appointments]
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          description: Appointment not found
        "401":
          description: Unauthorized

    delete:
      summary: Cancel a medical appointment
      operationId: deleteAppointment
      tags: [Appointments]
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Appointment cancelled
        "404":
          description: Appointment not found
        "401":
          description: Unauthorized

  /api/medical-appointments/{id}/status:
    put:
      summary: Update medical appointment status
      description: Updates the status of an existing medical appointment
      operationId: updateAppointmentStatus
      tags: [Appointments]
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentStatusRequest"
      responses:
        "200":
          description: Appointment status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "400":
          description: Validation error
        "404":
          description: Appointment not found
        "401":
          description: Unauthorized

components:
  schemas:
    AppointmentRequest:
      type: object
      required:
        - patientId
        - specialistId
        - scheduledAt
        - visitType
      properties:
        patientId:
          type: integer
          format: int64
          description: ID of the patient
          example: 1
        specialistId:
          type: integer
          format: int64
          description: ID of the specialist
          example: 2
        scheduledAt:
          type: string
          format: date-time
          description: Scheduled date and time of the appointment
          example: "2026-06-15T10:30:00"
        visitType:
          type: string
          description: Type of medical visit (e.g. CARDIOLOGY, DERMATOLOGY, GENERAL)
          example: "CARDIOLOGY"
        notes:
          type: string
          nullable: true
          description: Optional notes for the appointment
          example: "First visit"

    AppointmentStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: New appointment status (e.g. BOOKED, COMPLETED, CANCELLED)
          example: "COMPLETED"

    AppointmentResponse:
      type: object
      required:
        - id
        - patientId
        - patientFullName
        - specialistId
        - specialistFullName
        - specialistSpecialization
        - scheduledAt
        - visitType
        - status
        - hasReport
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          example: 1
        patientId:
          type: integer
          format: int64
          example: 1
        patientFullName:
          type: string
          description: Full name of the patient
          example: "Mario Rossi"
        specialistId:
          type: integer
          format: int64
          example: 2
        specialistFullName:
          type: string
          description: Full name of the specialist
          example: "Dott. Luca Bianchi"
        specialistSpecialization:
          type: string
          description: Specialization of the specialist
          example: "CARDIOLOGY"
        scheduledAt:
          type: string
          format: date-time
          example: "2026-06-15T10:30:00"
        visitType:
          type: string
          example: "CARDIOLOGY"
        status:
          type: string
          description: Appointment status (BOOKED, COMPLETED, CANCELLED)
          example: "BOOKED"
        notes:
          type: string
          nullable: true
          example: "First visit"
        hasReport:
          type: boolean
          description: Whether a clinical report has been filed for this appointment
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2026-05-01T09:00:00"

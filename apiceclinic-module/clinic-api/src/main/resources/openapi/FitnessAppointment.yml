openapi: 3.0.0
info:
  title: Fitness Appointment API
  description: Fitness appointment booking and management (personal training, group classes)
  version: "1.0.0"
servers:
  - url: "http://localhost:8080"

paths:
  /api/appointments:
    get:
      summary: List all fitness appointments
      description: Returns all appointments, optionally filtered by patientId, specialistId or status
      operationId: findAllFitnessAppointments
      tags: [Fitness Appointments]
      parameters:
        - name: patientId
          in: query
          required: false
          description: Filter by patient ID
          schema:
            type: integer
            format: int64
        - name: specialistId
          in: query
          required: false
          description: Filter by specialist ID
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: false
          description: Filter by appointment status (e.g. BOOKED, COMPLETED, CANCELLED)
          schema:
            type: string
      responses:
        "200":
          description: List of fitness appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FitnessAppointmentResponse"
        "401":
          description: Unauthorized

    post:
      summary: Book a new fitness appointment
      description: Creates a new fitness appointment
      operationId: createFitnessAppointment
      tags: [Fitness Appointments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FitnessAppointmentRequest"
      responses:
        "201":
          description: Fitness appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FitnessAppointmentResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /api/appointments/{id}:
    get:
      summary: Get fitness appointment by ID
      operationId: getFitnessAppointmentById
      tags: [Fitness Appointments]
      parameters:
        - name: id
          in: path
          required: true
          description: Fitness appointment ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Fitness appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FitnessAppointmentResponse"
        "404":
          description: Fitness appointment not found
        "401":
          description: Unauthorized

    delete:
      summary: Cancel a fitness appointment
      operationId: deleteFitnessAppointment
      tags: [Fitness Appointments]
      parameters:
        - name: id
          in: path
          required: true
          description: Fitness appointment ID
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Fitness appointment cancelled
        "404":
          description: Fitness appointment not found
        "401":
          description: Unauthorized

  /api/appointments/{id}/status:
    put:
      summary: Update fitness appointment status
      description: Updates the status of an existing fitness appointment
      operationId: updateFitnessAppointmentStatus
      tags: [Fitness Appointments]
      parameters:
        - name: id
          in: path
          required: true
          description: Fitness appointment ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FitnessAppointmentStatusRequest"
      responses:
        "200":
          description: Fitness appointment status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FitnessAppointmentResponse"
        "400":
          description: Validation error
        "404":
          description: Fitness appointment not found
        "401":
          description: Unauthorized

components:
  schemas:
    FitnessAppointmentRequest:
      type: object
      required:
        - patientId
        - specialistId
        - scheduledAt
        - serviceType
      properties:
        patientId:
          type: integer
          format: int64
          description: ID of the patient
          example: 1
        specialistId:
          type: integer
          format: int64
          description: ID of the specialist (trainer)
          example: 3
        scheduledAt:
          type: string
          format: date-time
          description: Scheduled date and time of the fitness appointment
          example: "2026-06-20T09:00:00"
        serviceType:
          type: string
          description: Type of fitness service (e.g. PERSONAL_TRAINING, YOGA, PILATES)
          example: "PERSONAL_TRAINING"
        notes:
          type: string
          nullable: true
          description: Optional notes for the appointment
          example: "Focus on lower body"

    FitnessAppointmentStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: New appointment status (e.g. BOOKED, COMPLETED, CANCELLED)
          example: "COMPLETED"

    FitnessAppointmentResponse:
      type: object
      required:
        - id
        - patientId
        - patientFullName
        - specialistId
        - specialistFullName
        - specialistRole
        - scheduledAt
        - serviceType
        - status
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          example: 1
        patientId:
          type: integer
          format: int64
          example: 1
        patientFullName:
          type: string
          description: Full name of the patient
          example: "Mario Rossi"
        specialistId:
          type: integer
          format: int64
          example: 3
        specialistFullName:
          type: string
          description: Full name of the specialist
          example: "Carlo Verdi"
        specialistRole:
          type: string
          description: Role of the specialist (e.g. TRAINER, NUTRITIONIST)
          example: "TRAINER"
        scheduledAt:
          type: string
          format: date-time
          example: "2026-06-20T09:00:00"
        serviceType:
          type: string
          example: "PERSONAL_TRAINING"
        status:
          type: string
          description: Appointment status (BOOKED, COMPLETED, CANCELLED)
          example: "BOOKED"
        notes:
          type: string
          nullable: true
          example: "Focus on lower body"
        createdAt:
          type: string
          format: date-time
          example: "2026-05-01T09:00:00"

openapi: 3.0.0
info:
  title: Staff / Trainers API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/trainers:
    get:
      summary: List all staff members
      description: Optionally filter by role
      operationId: findAllStaff
      parameters:
        - name: role
          in: query
          required: false
          description: Filter staff members by role (e.g. TRAINER, NUTRITIONIST)
          schema:
            type: string
      responses:
        "200":
          description: List of staff members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffResponse"

  /api/trainers/{id}:
    get:
      summary: Get staff member by ID
      description: Returns a staff member by its ID
      operationId: getStaffById
      parameters:
        - name: id
          in: path
          required: true
          description: Staff member ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Staff member found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffResponse"
        "404":
          description: Staff member not found

components:
  schemas:
    StaffResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          description: Staff role (e.g. TRAINER, NUTRITIONIST)
        email:
          type: string
          format: email
        phone:
          type: string
        specialization:
          type: string
          description: Main specialization of the staff member
      required:
        - id
        - firstName
        - lastName
        - role
        - email